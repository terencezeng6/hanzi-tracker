<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hanzi Tracker</title>
  <meta name="description" content="A simple website to track learned Chinese characters.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="characters.js" defer></script>
  <script src="script.js" defer></script>
</head>

<body>
  <header>
    <div class="header-content">
      <h1>Chinese Character Tracker</h1>
      <div id="auth-container">
        <!-- Google sign in script -->
        <script src="https://accounts.google.com/gsi/client" async defer></script>

        <div id="g_id_onload" data-client_id="167076485233-f4tn6fidnk2ue8oa38p4ng54bd5dkrnb.apps.googleusercontent.com"
          data-context="signin" data-ux_mode="popup" data-callback="handleCredentialResponse" data-auto_prompt="false">
        </div>

        <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline"
          data-text="signin_with" data-size="large" data-logo_alignment="left">
        </div>

        <div id="user-profile" style="display: none;">
          <span id="user-name"></span>
          <button id="logout-btn">Logout</button>
        </div>
      </div>
    </div>
  </header>
  <main>
    <div class="top-section">
      <p class="instruction-text">Click on a character to change its status! <br> Hold shift and drag to select multiple
        characters.</p>
      <div class="legend">
        <div class="legend-row">
          <div class="legend-box status-learning"></div>
          <span>Learned: <span id="learned-count">0</span></span>
        </div>
        <div class="legend-row">
          <div class="legend-box status-learned"></div>
          <span>In Progress: <span id="in-progress-count">0</span></span>
        </div>
      </div>
    </div>
    <div id="character-grid" class="character-grid">
    </div>
  </main>
  <footer>
    <p>Made by Terence Zeng, 2026</p>
  </footer>
</body>

</html>
